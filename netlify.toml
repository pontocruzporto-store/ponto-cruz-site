[build]
  command = "npm run build"
  publish = "dist"

# ─── Canonical: força HTTPS e non-www ────────────────────────────────────────
[[redirects]]
  from = "http://pontocruzconceptstore.pt/*"
  to = "https://pontocruzconceptstore.pt/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.pontocruzconceptstore.pt/*"
  to = "https://pontocruzconceptstore.pt/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.pontocruzconceptstore.pt/*"
  to = "https://pontocruzconceptstore.pt/:splat"
  status = 301
  force = true

# ─── Trailing slash: normaliza todas as URLs (remove o / final) ───────────────
# Isto resolve o "Cópia sem página canônica selecionada pelo usuário" no Search
# Console, que acontece quando /ko e /ko/ são tratadas como páginas distintas.
